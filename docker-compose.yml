services:
  db:
    image: postgres:16-alpine
    container_name: books_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: books_db
    ports:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d books_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: books_api
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/books_db
      - ACCESS_SECRET_KEY=dev_access_secret_key_change_me_in_production
      - REFRESH_SECRET_KEY=dev_refresh_secret_key_change_me_in_production
      - HOST=0.0.0.0,localhost,127.0.0.1
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
